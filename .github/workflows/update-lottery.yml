name: Update Lottery Data

on:
  schedule:
    - cron: '30 14 * * 1,2,3,4,5,6'  # 台灣時間 22:30，每週一到六
  workflow_dispatch:  # 允許手動執行

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch lottery data
        run: node scripts/fetch.js

      - name: Deploy to Vercel
        run: npx vercel --prod --yes --token=${{ secrets.VERCEL_TOKEN }}
